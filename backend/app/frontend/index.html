<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Manager</title>
    <style>
      :root {
        --bg: #f5fbf7;
        --bg-accent: #eef7ff;
        --surface: #ffffff;
        --surface-soft: #f8fffb;
        --text: #173126;
        --text-muted: #547063;
        --border: #cfe6d8;
        --primary: #2f9e72;
        --primary-strong: #21835d;
        --accent: #ef8cb1;
        --focus: #8d7cf6;
        --success: #1f8a5c;
        --danger: #b1435c;
        --radius-md: 12px;
        --radius-lg: 18px;
        --shadow: 0 10px 26px rgba(47, 158, 114, 0.12);
        --shadow-soft: 0 5px 16px rgba(23, 49, 38, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at top right, var(--bg-accent), transparent 45%), var(--bg);
      }

      .wrap { max-width: 1120px; margin: 32px auto; padding: 0 20px 28px; }
      h1 { margin: 0 0 18px; font-size: clamp(1.7rem, 2.6vw, 2.2rem); letter-spacing: 0.01em; }

      .panel {
        background: linear-gradient(180deg, var(--surface), var(--surface-soft));
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
        margin-bottom: 18px;
        box-shadow: var(--shadow-soft);
      }

      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      label { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); font-weight: 600; }

      select, button, input[type="file"] {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 9px 12px;
        background: #fff;
        color: var(--text);
        font: inherit;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background-color 0.18s ease;
      }

      select:hover, input[type="file"]:hover { border-color: var(--primary); }
      select:focus, button:focus, input[type="file"]:focus {
        outline: none;
        border-color: var(--focus);
        box-shadow: 0 0 0 3px rgba(141, 124, 246, 0.2);
      }

      button {
        cursor: pointer;
        border-color: transparent;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #fff;
        font-weight: 700;
        box-shadow: 0 8px 16px rgba(47, 158, 114, 0.22);
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 12px 20px rgba(47, 158, 114, 0.26); }
      button:active { transform: translateY(0); }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
      .card {
        background: linear-gradient(180deg, var(--surface), var(--surface-soft));
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 13px;
        box-shadow: var(--shadow);
      }
      .img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: var(--radius-md);
        background: #edf6f1;
        border: 1px solid var(--border);
      }
      .muted { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
      .pill {
        display: inline-block;
        margin-right: 6px;
        margin-bottom: 6px;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid #b9e8ce;
        font-size: 12px;
        font-weight: 600;
        color: #2a6e4f;
        background: #ecfbf3;
      }
      .title { margin: 8px 0 7px; font-size: 1.1rem; }
      .tag-row { margin-top: 8px; }
      .actions { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
      .ok { color: var(--success); font-size: 13px; font-weight: 600; }
      .err { color: var(--danger); font-size: 13px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Inventory Datenbank</h1>
      <div class="panel row">
        <label>Kategorie:
          <select id="categoryFilter">
            <option value="all">Alle</option>
            <option value="top">Top</option>
            <option value="bottom">Bottom</option>
            <option value="outer">Outer</option>
            <option value="shoes">Shoes</option>
            <option value="accessory">Accessory</option>
          </select>
        </label>
        <label>Sortierung:
          <select id="sortBy">
            <option value="name_asc">Name (A-Z)</option>
            <option value="name_desc">Name (Z-A)</option>
            <option value="price_asc">Preis (aufsteigend)</option>
            <option value="price_desc">Preis (absteigend)</option>
            <option value="newest">Neueste zuerst</option>
            <option value="oldest">Älteste zuerst</option>
          </select>
        </label>
        <button id="reloadBtn">Neu laden</button>
        <span id="status" class="muted"></span>
      </div>
      <div id="list" class="grid"></div>
    </div>

    <script>
      const API_BASE =
        window.__API_BASE__ ||
        (location.hostname === "127.0.0.1" || location.hostname === "localhost"
          ? ""
          : "https://YOUR-RAILWAY-BACKEND.up.railway.app");
      const API = `${API_BASE}/v1/wardrobe/items`;
      let allItems = [];

      async function fetchItems() {
        const status = document.getElementById("status");
        status.textContent = "Lade...";
        const res = await fetch(API);
        if (!res.ok) {
          status.textContent = "Fehler beim Laden";
          return;
        }
        allItems = await res.json();
        status.textContent = `${allItems.length} Items`;
        render();
      }

      function applyFilterSort(items) {
        const cat = document.getElementById("categoryFilter").value;
        const sortBy = document.getElementById("sortBy").value;

        let out = [...items];
        if (cat !== "all") out = out.filter((i) => i.category === cat);

        out.sort((a, b) => {
          if (sortBy === "name_asc") return a.name.localeCompare(b.name);
          if (sortBy === "name_desc") return b.name.localeCompare(a.name);
          if (sortBy === "price_asc") return (a.purchase_price ?? 999999) - (b.purchase_price ?? 999999);
          if (sortBy === "price_desc") return (b.purchase_price ?? -1) - (a.purchase_price ?? -1);
          if (sortBy === "newest") return b.id - a.id;
          if (sortBy === "oldest") return a.id - b.id;
          return 0;
        });
        return out;
      }

      function render() {
        const list = document.getElementById("list");
        const rows = applyFilterSort(allItems);
        list.innerHTML = "";
        for (const item of rows) {
          const card = document.createElement("div");
          card.className = "card";

          const imgUrl = item.image_url || "";
          const tags = (item.style_tags || []).map((t) => `<span class="pill">${t}</span>`).join("");

          card.innerHTML = `
            <img class="img" src="${imgUrl}" alt="${item.name}" onerror="this.style.opacity='0.25'" />
            <h3 class="title">${item.name}</h3>
            <div class="muted">Kategorie: ${item.category} · Größe: ${item.size_label || "-"}</div>
            <div class="muted">Marke: ${item.brand || "-"} · Material: ${item.material || "-"}</div>
            <div class="muted">Preis: ${item.purchase_price ?? "-"} · Menge: ${item.quantity ?? 1}</div>
            <div class="tag-row">${tags}</div>
            <div class="actions">
              <input type="file" accept="image/*" data-id="${item.id}" />
              <button data-upload="${item.id}">Bild hochladen</button>
              <span id="msg-${item.id}" class="muted"></span>
            </div>
          `;
          list.appendChild(card);
        }

        for (const btn of document.querySelectorAll("button[data-upload]")) {
          btn.addEventListener("click", async (e) => {
            const id = e.target.getAttribute("data-upload");
            const input = document.querySelector(`input[data-id='${id}']`);
            const msg = document.getElementById(`msg-${id}`);
            if (!input.files || !input.files[0]) {
              msg.className = "err";
              msg.textContent = "Bitte Datei wählen";
              return;
            }
            const fd = new FormData();
            fd.append("image", input.files[0]);
            msg.className = "muted";
            msg.textContent = "Upload...";
            const res = await fetch(`${API_BASE}/v1/wardrobe/items/${id}/image`, { method: "POST", body: fd });
            if (!res.ok) {
              msg.className = "err";
              msg.textContent = "Upload fehlgeschlagen";
              return;
            }
            msg.className = "ok";
            msg.textContent = "Gespeichert";
            await fetchItems();
          });
        }
      }

      document.getElementById("categoryFilter").addEventListener("change", render);
      document.getElementById("sortBy").addEventListener("change", render);
      document.getElementById("reloadBtn").addEventListener("click", fetchItems);
      fetchItems();
    </script>
  </body>
</html>
